<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoulBound Identity - Modular Version</title>

    <!-- React 18 - PRODUCTION -->
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>

    <!-- Ethers.js v5 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

    <!-- snarkjs for ZK proof generation in browser -->
    <script src="https://unpkg.com/snarkjs@0.7.6/build/snarkjs.min.js"></script>

    <!-- QR Code generation (QRious - reliable UMD/cdnjs build) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="root"></div>

    <script>
        console.log('🚀 Starting modular app load...');
        console.log('✅ React available:', typeof React !== 'undefined');
        console.log('✅ ReactDOM available:', typeof ReactDOM !== 'undefined');
        console.log('✅ ethers available:', typeof ethers !== 'undefined');

        // Expose React hooks globally for dynamically evaluated modules
        window.useState = React.useState;
        window.useEffect = React.useEffect;
        window.useCallback = React.useCallback;
        window.useMemo = React.useMemo;
        window.useRef = React.useRef;
        window.useContext = React.useContext;
    </script>

    <!-- Pre-compiled output (run: npm run build) -->
    <script src="dist/contracts.js?v=2"></script>
    <script src="dist/utils.js?v=2"></script>
    <script src="dist/components/theme.js?v=2"></script>
    <script src="dist/components/toast.js?v=2"></script>
    <script src="dist/components/ui.js?v=2"></script>
    <script src="dist/components/app-component.js?v=2"></script>
    <script src="dist/components/header.js?v=2"></script>
    <script src="dist/components/welcome.js?v=2"></script>
    <script src="dist/components/navigation.js?v=2"></script>
    <script src="dist/components/notification.js?v=2"></script>
    <script src="dist/components/identity-tab.js?v=2"></script>
    <script src="dist/components/qr-code.js?v=2"></script>
    <script src="dist/components/token-card.js?v=2"></script>
    <script src="dist/components/credentials-tab.js?v=2"></script>
    <script src="dist/components/access-control-tab.js?v=2"></script>
    <script src="dist/components/social-tab.js?v=2"></script>
    <script src="dist/components/reputation-section.js?v=2"></script>
    <script src="dist/components/projects-section.js?v=2"></script>
    <script src="dist/components/endorsements-section.js?v=2"></script>
    <script src="dist/components/zkp-section.js?v=2"></script>
    <script src="dist/components/analytics-tab.js?v=2"></script>
    <script src="dist/components/view-identities-tab.js?v=2"></script>
    <script src="dist/app.js?v=2"></script>
</body>
</html>
